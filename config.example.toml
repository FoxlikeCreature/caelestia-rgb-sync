# caelestia-rgb-sync config
color_source = "primaryPaletteKeyColor"

# Global correction — applied to all devices first.
# Per-device corrections (below) are applied on top of the result.
#
# Available per channel: <ch>_mul (multiplier), <ch>_min, <ch>_max (clamp)
# Channels: h, s, v  (HSV space)  then  r, g, b  (RGB space, after HSV step)
# Defaults when omitted: mul=1.0, min=0.0, max=1.0
[global]
s_mul = 1.55   # boost saturation — LEDs look washed out vs screen
v_min = 0.70   # never go darker than 70% brightness
v_max = 0.95   # leave a little headroom to avoid pure white

# Per-device overrides — matched by substring of device name (case-insensitive).
# Only fields that differ from [global] need to be listed.

[[devices]]
match = "ENE DRAM"
mode  = "direct"
s_mul = 1.3    # additional saturation on top of global
h_mul = 0.90   # shift hue slightly toward red (compensates yellow cast)
g_mul = 0.70   # tame green channel — ENE LEDs have stronger green

[[devices]]
match = "AORUS"
mode  = "direct"

[[devices]]
match = "Radeon RX"
mode        = "direct"
force_mode  = true   # I2C GPU needs set_mode before every update
fast        = false  # wait for hardware ack

[[devices]]
match = "Bloody"
mode  = "direct"
