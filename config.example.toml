color_source = "primaryPaletteKeyColor"

# Per-device normalization.
# Use 'caelestia-rgb-sync calibrate device' to set these interactively.
#
# gain=[R,G,B]        : compensate for LED channel brightness differences
# gamma=[R,G,B]       : per-channel gamma correction (1.0 = linear)
# black_point=[R,G,B] : minimum PWM floor AFTER gain+gamma, not an additive offset
# mode                : OpenRGB mode name (usually "direct")
# force_mode          : always switch mode even if already active (fix some GPU bugs)
# fast                : fast color updates (set false for some GPU RGB headers)
# skip                : exclude this device

[devices."ENE DRAM"]
gain        = [1.0, 1.0, 1.0]
gamma       = [1.0, 1.0, 1.0]
black_point = [0.0, 0.0, 0.0]
mode        = "direct"

[devices."Your GPU"]
gain        = [1.0, 1.0, 1.0]
gamma       = [1.0, 1.0, 1.0]
black_point = [0.0, 0.0, 0.0]
mode        = "direct"
force_mode  = true
fast        = false

# Global corrections applied after per-device normalization.
# Use 'caelestia-rgb-sync calibrate global' to tune interactively.
#
# brightness        : overall brightness multiplier (0.0-2.0)
# color_temperature : Kelvin; 6500 = neutral D65, lower = warmer, higher = cooler
# gain=[R,G,B]      : global per-channel multipliers
# gamma             : global gamma exponent applied uniformly
# saturation        : HSV saturation multiplier applied after color_temperature
#                     (1.0 = no change; 1.3-1.6 typical to compensate for LED desaturation)

[global]
brightness        = 1.0
color_temperature = 6500
gain              = [1.0, 1.0, 1.0]
gamma             = 1.0
saturation        = 1.4

# Hue corrections - applied with linear falloff within hue_width.
# hue_center : center of the affected hue range (0.0-1.0 wheel)
#   0.00 red  0.08 orange  0.17 yellow  0.33 green
#   0.50 cyan  0.67 blue   0.75 purple  0.83 magenta
# hue_width  : total width of the affected hue band
# gain=[R,G,B]: channel multipliers at the center (rolls off to 1.0 at edges)
#
# Use saturation_max instead of hue_center/hue_width to target white/desaturated colors.

[[global.hue_corrections]]
name       = "yellow-orange"
hue_center = 0.12
hue_width  = 0.15
gain       = [1.0, 0.7, 0.0]

